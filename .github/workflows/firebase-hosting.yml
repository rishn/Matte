name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Firebase CLI v15+ requires Node >=20; use Node 20 for compatibility
          node-version: '20'

      - name: Check Node.js & npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        # Use npm install when package-lock.json is not present in the repo.
        # For reproducible builds, consider committing package-lock.json and using `npm ci`.
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (using CI token)
        # Using a CI token avoids service-account IAM edge-cases for preview deploys.
        # Create a token locally with `firebase login:ci` and add it as repo secret `FIREBASE_TOKEN`.
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "Missing FIREBASE_TOKEN secret. Create one via 'firebase login:ci' and add it to repo secrets as FIREBASE_TOKEN.";
            exit 1;
          fi
          npx firebase-tools@latest deploy --only hosting --project "$PROJECT_ID" --token "$FIREBASE_TOKEN" --non-interactive
